# =====================================================================
#  展贸中心智能化中控系统 - Nginx (Windows) 反向代理配置
#  目标主机: Advantech ARK-1220L-S6A2 (Windows 11)
#  部署路径: D:\smart-control\
#  Nginx 安装路径示例: C:\nginx\
#
#  安装步骤 (PowerShell, 管理员):
#    1) 下载 nginx-1.26.x Windows 版, 解压到 C:\nginx\
#    2) 将本文件放入 C:\nginx\conf\sites\smart-control.conf
#    3) 编辑 C:\nginx\conf\nginx.conf 在 http {} 块内追加:
#         include  sites/*.conf;
#    4) 测试配置:  cd C:\nginx ; .\nginx.exe -t
#    5) 启动:      .\nginx.exe
#       重载:      .\nginx.exe -s reload
#       停止:      .\nginx.exe -s stop
#    6) 开机自启可通过 Windows 任务计划 (见 deploy\windows-startup\README.md)
#
#  端口规划:
#    80    Nginx       (现场局域网 + Tailscale 接入)
#    3000  Node 后端   (loopback, 由 PM2 启动, 不直接对外暴露)
#    4173  Vite preview (备用, 一般不需要)
# =====================================================================

# --- 上游: Node 后端 (PM2 守护) ---
upstream smart_control_backend {
  server 127.0.0.1:3000;
  keepalive 32;
}

# --- WebSocket 升级头部 (map 必须放在 http{} 顶层, 不在 server 块内) ---
map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen      80 default_server;
  server_name _;

  # 安全 / 性能基线
  server_tokens off;
  client_max_body_size 20m;
  client_body_timeout  60s;
  send_timeout         60s;
  keepalive_timeout    75s;

  # ---------- gzip ----------
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_comp_level 5;
  gzip_types
    text/plain
    text/css
    application/javascript
    application/json
    application/xml
    image/svg+xml
    font/woff
    font/woff2;

  # ---------- 日志 ----------
  access_log  C:/nginx/logs/smart-control.access.log;
  error_log   C:/nginx/logs/smart-control.error.log warn;

  # ---------- 静态前端: Vue3 PWA (vite build 产物) ----------
  root D:/smart-control/frontend/dist;
  index index.html;

  # PWA / SPA 路由: 任意未命中文件回退到 index.html
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache" always;
  }

  # 资源缓存: vite 输出带 hash, 可长缓存
  location ~* ^/assets/.*\.(?:js|css|woff2?|ttf|svg|png|jpg|jpeg|gif|webp|ico)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable" always;
    access_log off;
  }

  # Service Worker 不缓存 (确保 PWA 升级生效)
  location = /sw.js          { add_header Cache-Control "no-cache" always; }
  location = /registerSW.js  { add_header Cache-Control "no-cache" always; }
  location = /manifest.webmanifest { add_header Cache-Control "no-cache" always; }

  # ---------- /api → Node 后端 ----------
  location /api/ {
    proxy_http_version 1.1;
    proxy_pass http://smart_control_backend;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 5s;
    proxy_read_timeout    60s;
    proxy_send_timeout    60s;
    # API 不缓存
    add_header Cache-Control "no-store" always;
  }

  # ---------- /ws/status → WebSocket ----------
  location /ws/ {
    proxy_http_version 1.1;
    proxy_pass http://smart_control_backend;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $connection_upgrade;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_read_timeout   3600s;   # 长连接
    proxy_send_timeout   3600s;
    proxy_buffering off;
  }

  # ---------- 健康探针 (供 health.ps1 / Tailscale 上游使用) ----------
  location = /healthz {
    proxy_pass http://smart_control_backend/api/system/health;
    proxy_set_header Host $host;
    access_log off;
  }

  # ---------- 拒绝隐私文件 ----------
  location ~* /\.(env|git|ht|svn) { deny all; access_log off; log_not_found off; }
}
