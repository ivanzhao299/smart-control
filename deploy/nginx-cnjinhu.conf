# cnjinhu.top + eggslao.com nginx 配置
# 更新时间: 2026-05-22
# 改动: 全站加 HTTP Basic Auth (除应急卡 / 招聘 / 各 backend api / certbot 外)

server {
    server_name cnjinhu.top www.cnjinhu.top;

    root /srv/www/cnjinhu.top/landing;
    index index.html;

    # ============ HTTP Basic Auth (默认全开, 例外路径在各 location 单独关闭) ============
    auth_basic           "cnjinhu.top - 内部访问 (找管理员要密码)";
    auth_basic_user_file /etc/nginx/.htpasswd-cnjinhu;

    # ---- 子项目: ai ----
    location = /ai {
        return 301 /ai/;
    }

    location ^~ /ai/ {
        alias /srv/www/cnjinhu.top/ai/current/;
        index index.html;
        try_files $uri $uri/ =404;
        include /etc/nginx/snippets/phoenix-static-cache.conf;
    }

    # ---- 子项目: smart-control ----
    # backend API/WS 不能加 basic auth (PWA fetch 不带 basic credentials, 会被 401)
    location ^~ /control/api/ {
        auth_basic off;
        proxy_pass http://127.0.0.1:3200/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    location ^~ /control/ws/ {
        auth_basic off;
        proxy_pass http://127.0.0.1:3200/ws/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    location ^~ /control/ {
        alias /srv/www/cnjinhu.top/control/current/;
        index index.html;
        try_files $uri $uri/ =404;
    }

    # ---- 子项目: finance (财务台账容器) ----
    location = /finance  { return 301 /finance/loan/; }
    location = /finance/ { return 301 /finance/loan/; }

    location ^~ /finance/loan/api/ {
        auth_basic off;
        proxy_pass http://127.0.0.1:3300/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    location ^~ /finance/loan/ {
        alias /srv/www/cnjinhu.top/finance/current/;
        index index.html;
        try_files $uri $uri/ /finance/loan/index.html;
        location = /finance/loan/index.html {
            add_header Cache-Control "no-cache" always;
        }
    }

    # ---- 招聘子站 (员工微信扫码使用, 保留无密码) ----
    location /recruit/ {
        auth_basic off;
        alias /var/www/jinhu-recruit/;
        index index.html;
        try_files $uri $uri/ /recruit/index.html;
    }
    location /recruit-api/ {
        auth_basic off;
        proxy_pass http://127.0.0.1:3101;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    # ---- 应急操作卡 (现场故障可能没人记得密码, 保持公开) ----
    location = /emergency-card.html {
        auth_basic off;
    }

    # ---- 旧 PHOENIX /api/ → erp.eggslao.com V3 接管 (无密码, 仅 308 跳转) ----
    location ^~ /api/  {
        auth_basic off;
        return 308 https://erp.eggslao.com$request_uri;
    }

    # ---- /jinhu/ 容器: 金湖项目文档/资源 (含 jinhu/docs 技术文档门户) ----
    location ^~ /jinhu/ {
        try_files $uri $uri/index.html =404;
    }

    # ---- 根路径: 子项目导航页 ----
    location / {
        try_files $uri /index.html =404;
    }

    listen 443 ssl http2; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/cnjinhu.top/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/cnjinhu.top/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.cnjinhu.top) {
        return 301 https://$host$request_uri;
    } # managed by Certbot
    if ($host = cnjinhu.top) {
        return 301 https://$host$request_uri;
    } # managed by Certbot
    listen 80;
    server_name cnjinhu.top www.cnjinhu.top;

    # certbot 验证路径不能加密 (LetsEncrypt 续签需要无密码访问)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    return 404; # managed by Certbot
}

# eggslao.com 官网主域 (无变化, 不加密)
server {
    listen 80;
    server_name eggslao.com www.eggslao.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name eggslao.com www.eggslao.com;

    ssl_certificate /etc/letsencrypt/live/eggslao.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/eggslao.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

    root /var/www/eggslao.com;
    index index.html;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location ~* \.(?:js|css|png|jpg|jpeg|gif|webp|avif|svg|ico|mp4)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
