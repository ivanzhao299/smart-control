name: Deploy GK9000 through WireGuard

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: smart-control-gk9000-production
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: |
            backend/pnpm-lock.yaml
            frontend/pnpm-lock.yaml

      - name: Validate backend
        working-directory: backend
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Validate frontend
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm run typecheck
          pnpm run build

  deploy:
    name: Deploy to GK9000
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Configure restricted jump-host identity
        env:
          JUMP_SSH_KEY: ${{ secrets.GK9000_DEPLOY_JUMP_SSH_KEY }}
          JUMP_KNOWN_HOSTS: ${{ secrets.GK9000_DEPLOY_JUMP_KNOWN_HOSTS }}
        run: |
          install -m 700 -d "$HOME/.ssh"
          printf '%s\n' "$JUMP_SSH_KEY" > "$HOME/.ssh/gk9000-deploy-jump"
          printf '%s\n' "$JUMP_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/gk9000-deploy-jump" "$HOME/.ssh/known_hosts"

      - name: Deploy requested commit through Aliyun
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          ssh \
            -i "$HOME/.ssh/gk9000-deploy-jump" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=4 \
            root@123.57.220.65 \
            "gk9000-deploy ${COMMIT_SHA}"

      - name: Verify through the WireGuard jump host
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          ssh \
            -i "$HOME/.ssh/gk9000-deploy-jump" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            root@123.57.220.65 \
            "gk9000-verify ${COMMIT_SHA}"
